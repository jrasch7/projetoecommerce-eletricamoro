<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir senha · Admin Elétrica Moro</title>
    <script src="https://cdn.tailwindcss.com?3.4.1"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-3" style="background-color:#e6efff;color:#0a2540;">
                <i class="ph ph-key text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Definir senha</h1>
            <p class="text-sm text-slate-500 mt-1" id="subtitle">Crie sua senha para acessar o painel administrativo.</p>
        </div>

        <div id="loadingState" class="text-center py-8">
            <i class="ph ph-spinner animate-spin text-3xl text-slate-400"></i>
            <p class="text-sm text-slate-500 mt-2">Validando convite…</p>
        </div>

        <div id="errorState" class="hidden bg-rose-50 border border-rose-200 text-rose-700 rounded-xl p-4 text-sm">
            <p id="errorMessage"></p>
            <a href="/admin-login.html" class="block mt-3 text-rose-700 underline font-medium">Ir para o login</a>
        </div>

        <form id="passwordForm" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input id="emailField" type="email" disabled class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nova senha</label>
                <input id="passwordField" type="password" required minlength="8" placeholder="Mínimo 8 caracteres"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar senha</label>
                <input id="confirmField" type="password" required minlength="8"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" id="submitBtn"
                    class="w-full py-3 rounded-xl bg-slate-900 text-white font-semibold hover:bg-slate-800 transition disabled:opacity-50">
                Salvar e entrar
            </button>
            <p id="formError" class="hidden text-sm text-rose-600 text-center"></p>
        </form>
    </div>

    <script src="/js/supabase-config.js"></script>
    <script type="module">
        import { adminAuth, supabase } from "/js/admin-auth.js";

        const loadingState = document.getElementById("loadingState");
        const errorState = document.getElementById("errorState");
        const errorMessage = document.getElementById("errorMessage");
        const passwordForm = document.getElementById("passwordForm");
        const emailField = document.getElementById("emailField");
        const passwordField = document.getElementById("passwordField");
        const confirmField = document.getElementById("confirmField");
        const submitBtn = document.getElementById("submitBtn");
        const formError = document.getElementById("formError");
        const subtitle = document.getElementById("subtitle");

        function showError(msg) {
            loadingState.classList.add("hidden");
            passwordForm.classList.add("hidden");
            errorState.classList.remove("hidden");
            errorMessage.textContent = msg;
        }

        function showForm(user, isRecovery) {
            loadingState.classList.add("hidden");
            errorState.classList.add("hidden");
            passwordForm.classList.remove("hidden");
            emailField.value = user.email || "";
            if (isRecovery) {
                subtitle.textContent = "Defina uma nova senha para acessar o painel.";
            }
        }

        // Detecta erro no hash da URL (ex: #error=access_denied&error_code=otp_expired)
        // e mostra mensagem amigável imediatamente.
        const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
        const hashParams = new URLSearchParams(hash);
        if (hashParams.get("error")) {
            const code = hashParams.get("error_code");
            const desc = hashParams.get("error_description") || "Link inválido.";
            const friendly =
                code === "otp_expired"
                    ? "Este link expirou ou já foi usado. Solicite um novo na tela de login (\"Esqueci minha senha\")."
                    : decodeURIComponent(desc.replace(/\+/g, " "));
            showError(friendly);
        } else {
            // Supabase client com detectSessionInUrl=true processa o hash do convite/reset
            // e dispara PASSWORD_RECOVERY (reset) ou SIGNED_IN (invite) automaticamente.
            let handled = false;

            supabase.auth.onAuthStateChange(async (event, session) => {
                if (handled) return;
                if ((event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") && session?.user) {
                    handled = true;
                    showForm(session.user, event === "PASSWORD_RECOVERY");
                }
            });

            // Fallback: se já há sessão ativa (página recarregada), apenas mostra o form
            setTimeout(async () => {
                if (handled) return;
                const user = await adminAuth.getUser();
                if (user) {
                    handled = true;
                    showForm(user, false);
                } else {
                    showError("Link inválido ou expirado. Solicite um novo na tela de login (\"Esqueci minha senha\").");
                }
            }, 1500);
        }

        passwordForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            formError.classList.add("hidden");

            if (passwordField.value !== confirmField.value) {
                formError.textContent = "As senhas não coincidem.";
                formError.classList.remove("hidden");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Salvando…";
            try {
                const { error } = await supabase.auth.updateUser({ password: passwordField.value });
                if (error) throw error;
                window.location.href = "/admin.html";
            } catch (err) {
                formError.textContent = err.message || "Erro ao salvar senha.";
                formError.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.textContent = "Salvar e entrar";
            }
        });
    </script>
</body>
</html>
