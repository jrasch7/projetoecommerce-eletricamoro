<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Carregando · Elétrica Moro</title>
    
    <!-- Tailwind + Phosphor + Inter -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a2540',
                        secondary: '#1a365d',
                        accent: '#e74c3c',
                        'light-gray': '#f4f4f4',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos compartilhados */
        @keyframes slideBanner {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-slide {
            display: inline-block;
            white-space: nowrap;
            animation: slideBanner 40s linear infinite;
        }
        .top-bar-height { height: 32px; }
        .top-bar-container {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button, a, .clickable { transition: all 0.3s ease; }
        .product-img, .category-img {
            aspect-ratio: 1 / 1;
            object-fit: contain;
            background: #f9fafb;
            transition: transform 0.3s ease;
        }
        .group:hover .product-img, .group:hover .category-img { transform: scale(1.03); }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-bottom-color: #0a2540;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-light-gray font-sans text-gray-900">

<!-- ===== HEADER GLOBAL ===== -->
<header id="global-header"></header>

<!-- ===== CONTEÚDO PRINCIPAL: CATEGORIA (dinâmico) ===== -->
<main class="pb-16">
    <section class="bg-white border-b border-gray-200 py-8">
        <div class="container mx-auto px-4">
            <nav class="flex text-sm text-gray-500 mb-2" aria-label="Breadcrumb">
                <ol class="flex items-center space-x-2">
                    <li><a href="/" class="hover:text-primary transition">Home</a></li>
                    <li><i class="ph ph-caret-right text-xs"></i></li>
                    <li><a href="/categoria.html" id="breadcrumb-categories-link" class="hover:text-primary transition">Categorias</a></li>
                    <li id="breadcrumb-separator" class="hidden"><i class="ph ph-caret-right text-xs"></i></li>
                    <li id="breadcrumb-category" class="text-primary font-medium truncate hidden">Carregando...</li>
                </ol>
            </nav>
            <h1 id="page-title" class="text-3xl md:text-4xl font-bold text-primary">Carregando...</h1>
            <div id="category-description" class="text-gray-600 mt-2 max-w-3xl"></div>
        </div>
    </section>

    <section class="container mx-auto px-4 py-10">
        <div id="loading-indicator" class="flex flex-col items-center justify-center py-20">
            <span class="loader"></span>
            <p class="mt-4 text-gray-500">Carregando conteúdo...</p>
        </div>

        <div id="empty-state" class="hidden text-center py-16">
            <i class="ph ph-smiley-sad text-5xl text-gray-400 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700" id="empty-message">Nenhum item encontrado.</h3>
            <p class="text-gray-500 mt-2">Tente novamente mais tarde ou explore outras opções.</p>
            <a href="/" class="inline-block mt-6 bg-primary text-white px-6 py-3 rounded-full font-medium hover:bg-secondary transition">Ver todos os produtos</a>
        </div>

        <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden"></div>
    </section>
</main>

<!-- ===== FOOTER GLOBAL ===== -->
<footer id="global-footer"></footer>

<!-- Scripts -->
<script src="js/main-components.js"></script>
<script>
    (function() {
        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        function renderCategoryCard(category) {
            const imageUrl = category.imageUrl || category.image || 'https://placehold.co/400x400?text=Categoria';
            return `
                <a href="/categoria.html?categoryId=${category.id}" class="group bg-white rounded-2xl overflow-hidden hover:shadow-2xl transition-all duration-300 hover:scale-[1.02] border border-gray-100 flex flex-col h-full">
                    <div class="p-4 flex items-center justify-center bg-gray-50">
                        <img src="${imageUrl}" alt="${category.name}" class="category-img w-full h-auto max-h-44 object-contain" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=Categoria'">
                    </div>
                    <div class="p-4 flex flex-col flex-grow text-center">
                        <h3 class="text-lg font-bold text-primary group-hover:text-accent transition-colors">${category.name}</h3>
                        ${category.description ? `<p class="text-sm text-gray-500 mt-1 line-clamp-2">${category.description}</p>` : ''}
                        <div class="mt-4 text-accent font-medium text-sm flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            Ver produtos <i class="ph ph-arrow-right"></i>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderProductCard(product) {
            const price = typeof product.price === 'number' ? product.price : parseFloat(product.price) || 0;
            const parcelas = 3;
            const valorParcela = price / parcelas;
            const desconto = product.on_sale ? Math.floor(Math.random() * 12 + 5) : 0;
            const precoComDesconto = desconto > 0 ? (price * (1 - desconto / 100)).toFixed(2) : price.toFixed(2);

            let imageUrl = 'https://placehold.co/400x400?text=Eletrica+Moro';
            if (product.images && Array.isArray(product.images) && product.images.length > 0) {
                imageUrl = product.images[0];
            } else if (product.image_url) {
                imageUrl = product.image_url;
            }

            const badgeHtml = [];
            if (product.is_featured) badgeHtml.push('<span class="absolute top-3 left-3 z-10 bg-blue-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full">Destaque</span>');
            if (product.on_sale || desconto > 0) badgeHtml.push(`<span class="absolute top-3 ${product.is_featured ? 'left-20' : 'left-3'} z-10 bg-accent text-white text-[10px] font-bold px-2.5 py-1 rounded-full">-${desconto}%</span>`);

            const productData = {
                id: product.id,
                name: product.name,
                price: price,
                image: imageUrl
            };
            const productJson = JSON.stringify(productData).replace(/'/g, "&apos;");

            return `
                <div class="bg-white rounded-2xl overflow-hidden group hover:shadow-2xl transition-all duration-300 hover:scale-[1.02] border border-gray-100 relative flex flex-col h-full">
                    ${badgeHtml.join('')}
                    <div class="p-4 flex items-center justify-center bg-gray-50">
                        <img src="${imageUrl}" alt="${product.name}" class="product-img w-full h-auto max-h-44 object-contain" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=Eletrica+Moro'">
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 min-h-[2.5rem]">${product.name}</h3>
                        ${product.brand ? `<p class="text-xs text-gray-500 mt-1">${product.brand}</p>` : ''}
                        <div class="mt-2">
                            ${desconto > 0 ? `<span class="text-gray-400 text-xs line-through">R$ ${price.toFixed(2)}</span>` : ''}
                            <div class="text-xl font-bold text-primary">R$ ${desconto > 0 ? precoComDesconto : price.toFixed(2)}</div>
                            <div class="text-[11px] text-gray-500 mt-1">ou ${parcelas}x de R$ ${valorParcela.toFixed(2)} <span class="font-semibold">sem juros</span></div>
                        </div>
                        <button class="add-to-cart-btn mt-4 w-full bg-primary/5 hover:bg-primary text-primary hover:text-white py-2.5 rounded-xl text-sm font-semibold transition-all duration-300" data-product='${productJson}'>Adicionar</button>
                    </div>
                </div>
            `;
        }

        async function loadPage() {
            const categoryId = getQueryParam('categoryId') || getQueryParam('subCategoryId');
            const hasParam = !!categoryId;

            const titleEl = document.getElementById('page-title');
            const breadcrumbCatEl = document.getElementById('breadcrumb-category');
            const breadcrumbSep = document.getElementById('breadcrumb-separator');
            const descEl = document.getElementById('category-description');
            const gridEl = document.getElementById('content-grid');
            const loadingEl = document.getElementById('loading-indicator');
            const emptyEl = document.getElementById('empty-state');
            const emptyMsg = document.getElementById('empty-message');

            gridEl.innerHTML = '';
            gridEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            loadingEl.classList.remove('hidden');

            try {
                if (!hasParam) {
                    document.title = 'Nossas Categorias · Elétrica Moro';
                    titleEl.textContent = 'Nossas Categorias';
                    descEl.textContent = 'Explore nossas linhas de produtos e encontre o que precisa.';
                    breadcrumbCatEl.classList.add('hidden');
                    breadcrumbSep.classList.add('hidden');

                    const categories = await AppCore.fetchCategories();
                    loadingEl.classList.add('hidden');

                    if (!categories || categories.length === 0) {
                        emptyMsg.textContent = 'Nenhuma categoria cadastrada.';
                        emptyEl.classList.remove('hidden');
                        return;
                    }
                    gridEl.innerHTML = categories.map(c => renderCategoryCard(c)).join('');
                    gridEl.classList.remove('hidden');
                } else {
                    let categoryData = null;
                    try {
                        const catRes = await fetch(`/api/categories/${categoryId}`);
                        if (catRes.ok) categoryData = await catRes.json();
                    } catch (e) {}
                    if (!categoryData) {
                        const all = await AppCore.fetchCategories();
                        categoryData = all.find(c => c.id == categoryId);
                    }

                    const catName = categoryData ? categoryData.name : 'Produtos';
                    document.title = `${catName} · Elétrica Moro`;
                    titleEl.textContent = catName;
                    descEl.textContent = categoryData?.description || '';
                    breadcrumbCatEl.textContent = catName;
                    breadcrumbCatEl.classList.remove('hidden');
                    breadcrumbSep.classList.remove('hidden');

                    const prodRes = await fetch(`/api/products?subCategoryId=${categoryId}`);
                    if (!prodRes.ok) throw new Error('Erro ao carregar produtos');
                    const products = await prodRes.json();
                    loadingEl.classList.add('hidden');

                    if (!products || products.length === 0) {
                        emptyMsg.textContent = 'Ainda não temos produtos cadastrados nesta categoria.';
                        emptyEl.classList.remove('hidden');
                        return;
                    }
                    gridEl.innerHTML = products.map(p => renderProductCard(p)).join('');
                    gridEl.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                loadingEl.classList.add('hidden');
                emptyMsg.textContent = 'Ocorreu um erro ao carregar os dados.';
                emptyEl.classList.remove('hidden');
                titleEl.textContent = 'Erro';
            }
        }

        // Previne comportamento padrão de links "#"
        document.querySelectorAll('a[href="#"]').forEach(l => l.addEventListener('click', e => e.preventDefault()));

        // Ajuste no breadcrumb "Categorias"
        document.getElementById('breadcrumb-categories-link')?.addEventListener('click', (e) => {
            if (!getQueryParam('categoryId') && !getQueryParam('subCategoryId')) e.preventDefault();
        });

        loadPage();
    })();
</script>
</body>
</html>git
